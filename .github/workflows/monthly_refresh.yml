name: Monthly Refresh

on:
  schedule:
    - cron: '0 2 1 * *'
  workflow_dispatch:
    inputs:
      force_retrain:
        description: Force model retraining
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: monthly-refresh
  cancel-in-progress: false

jobs:
  refresh-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      DATABASE_BACKEND: snowflake
      SNOWFLAKE_ACCOUNT: ${{ vars.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_PIPELINE_USER }}
      SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PIPELINE_PRIVATE_KEY }}
      SNOWFLAKE_PRIVATE_KEY_PASSPHRASE: ${{ secrets.SNOWFLAKE_PIPELINE_PRIVATE_KEY_PASSPHRASE }}
      SNOWFLAKE_ROLE: AUTOLENS_PIPELINE
      SNOWFLAKE_DATABASE: AUTOLENS_AU
      SNOWFLAKE_SCHEMA: RAW
      SNOWFLAKE_WAREHOUSE: AUTOLENS_WH
      SNOWFLAKE_QUERY_TAG: autolens_monthly_refresh_${{ github.run_id }}
      NSW_FUEL_API_KEY: ${{ secrets.NSW_FUEL_API_KEY }}
      NSW_FUEL_API_SECRET: ${{ secrets.NSW_FUEL_API_SECRET }}
      KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
      KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install pinned project dependencies
        run: |
          python -m pip install uv==0.6.13
          uv sync --frozen --extra dbt

      - name: Validate required credentials
        run: |
          uv run python - <<'PY'
          import os
          required = [
              "SNOWFLAKE_ACCOUNT", "SNOWFLAKE_USER", "SNOWFLAKE_PRIVATE_KEY",
              "NSW_FUEL_API_KEY", "NSW_FUEL_API_SECRET", "KAGGLE_USERNAME", "KAGGLE_KEY",
          ]
          missing = [name for name in required if not os.getenv(name)]
          if missing:
              raise SystemExit("Missing required secrets: " + ", ".join(missing))
          PY

      - name: Restore latest model release when available
        run: |
          mkdir -p models/artifacts
          tag="$(gh release list --limit 50 --json tagName --jq '[.[] | select(.tagName | startswith("model-"))][0].tagName // ""')"
          if [[ -n "$tag" ]]; then
            gh release download "$tag" --dir models/artifacts --pattern 'hedonic_model_latest.joblib'
            gh release download "$tag" --dir models/artifacts --pattern 'latest_metrics.json'
          fi

      - name: Initialize database schema
        run: uv run python scripts/setup_database.py

      - name: Run source ingestion
        run: >-
          uv run python scripts/run_pipeline.py --monthly-refresh
          --output artifacts/pipeline_result.json

      - name: Build and test dbt project
        working-directory: dbt_autolens
        run: |
          uv run dbt deps
          uv run dbt build --profiles-dir ../.github/dbt-snowflake --exclude resource_type:seed

      - name: Evaluate drift and train when required
        id: model
        shell: bash
        run: |
          before="$(sha256sum models/artifacts/hedonic_model_latest.joblib 2>/dev/null || true)"
          if [[ "${{ inputs.force_retrain }}" == "true" ]]; then
            uv run python scripts/train_model.py --force-retrain
          else
            uv run python scripts/train_model.py --check-drift
          fi
          after="$(sha256sum models/artifacts/hedonic_model_latest.joblib 2>/dev/null || true)"
          if [[ "$before" != "$after" ]]; then
            echo "trained=true" >> "$GITHUB_OUTPUT"
          else
            echo "trained=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Write measured refresh evidence
        run: >-
          uv run python scripts/write_refresh_status.py
          --pipeline artifacts/pipeline_result.json
          --dbt-results dbt_autolens/target/run_results.json
          --model-metrics models/artifacts/latest_metrics.json
          --output docs/operations/latest_refresh.json
          --changelog docs/CHANGELOG.md

      - name: Upload run evidence and model artifact
        uses: actions/upload-artifact@v6
        with:
          name: monthly-refresh-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: error
          retention-days: 90
          path: |
            artifacts/pipeline_result.json
            dbt_autolens/target/run_results.json
            docs/operations/latest_refresh.json
            models/artifacts/hedonic_model_latest.joblib
            models/artifacts/latest_metrics.json
            models/artifacts/latest_drift.json

      - name: Publish newly trained model as prerelease
        if: steps.model.outputs.trained == 'true' && github.ref == 'refs/heads/main'
        run: |
          tag="model-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          gh release create "$tag" \
            models/artifacts/hedonic_model_latest.joblib \
            models/artifacts/latest_metrics.json \
            --target "$GITHUB_SHA" \
            --title "AutoLens model ${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT}" \
            --notes "Calibrated artifact produced by Monthly Refresh run ${GITHUB_RUN_ID}." \
            --prerelease

      - name: Open measured refresh evidence PR
        if: github.ref == 'refs/heads/main'
        run: |
          branch="automation/monthly-refresh-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git switch -c "$branch"
          git add docs/CHANGELOG.md docs/operations/latest_refresh.json
          git commit -m "chore: record measured monthly refresh ${GITHUB_RUN_ID}"
          git push --set-upstream origin "$branch"
          gh pr create \
            --base main \
            --head "$branch" \
            --title "chore: measured monthly refresh ${GITHUB_RUN_ID}" \
            --body "Generated from successful ingestion, dbt build, and model workflow evidence."
