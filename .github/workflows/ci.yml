# AutoLens AU — CI Pipeline
# Runs on every push and PR to main
# Validates: formatting, lint, types, tests, and a seed-backed dbt build

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: autolens_au_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install uv==0.6.13
          uv sync --frozen --extra dev --extra dbt

      - name: Verify Streamlit dependency export
        run: |
          uv export --frozen --no-dev --no-hashes --no-emit-project --no-header \
            --output-file /tmp/requirements.txt >/dev/null
          diff -u requirements.txt /tmp/requirements.txt

      - name: Check formatting with ruff
        run: uv run ruff format --check src/ config/ scripts/ tests/

      - name: Lint with ruff
        run: uv run ruff check src/ config/ scripts/ tests/ --output-format=github

      - name: Type check with mypy
        run: uv run mypy src/ config/ scripts/ --ignore-missing-imports

      - name: Run tests
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/autolens_au_test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: autolens_au_test
          DB_USER: test_user
          DB_PASSWORD: test_password
        run: |
          uv run pytest tests/ -v --cov=src --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: coverage.xml

  dbt-check:
    runs-on: ubuntu-latest
    needs: lint-and-test
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: autolens_au_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dbt
        run: |
          python -m pip install uv==0.6.13
          uv sync --frozen --extra dbt

      - name: dbt deps
        working-directory: dbt_autolens
        run: uv run dbt deps

      - name: Seed CI source tables
        working-directory: dbt_autolens
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: autolens_au_test
          DB_USER: test_user
          DB_PASSWORD: test_password
        run: uv run dbt seed --profiles-dir ../.github/dbt --full-refresh

      - name: Build and test dbt project
        working-directory: dbt_autolens
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: autolens_au_test
          DB_USER: test_user
          DB_PASSWORD: test_password
        run: uv run dbt build --profiles-dir ../.github/dbt --exclude resource_type:seed
