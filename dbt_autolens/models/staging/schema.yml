version: 2

sources:
  - name: raw
    description: "Raw ingested data from external sources"
    schema: raw
    tables:
      - name: raw_listings
        description: "Combined Australian vehicle listings from Kaggle datasets"
        columns:
          - name: brand
            description: "Vehicle manufacturer name"
            data_tests:
              - not_null
          - name: price
            description: "Listed price in AUD"
            data_tests:
              - not_null
          - name: year
            description: "Year of manufacture"
            data_tests:
              - not_null
          - name: listing_fingerprint
            description: "Stable natural-listing fingerprint"
            data_tests:
              - not_null
          - name: snapshot_date
            description: "Date on which the source snapshot was ingested"
            data_tests:
              - not_null

      - name: raw_fuel_prices
        description: "NSW fuel prices from FuelCheck API"
        columns:
          - name: stationcode
            description: "Unique station identifier"
          - name: price
            description: "Fuel price (cents per litre)"

      - name: raw_qld_registration_activity
        description: "QLD monthly new-registration and transfer activity; not total active fleet"
        columns:
          - name: make
            description: "Vehicle make/manufacturer"
            data_tests:
              - not_null
          - name: activity_month
            data_tests:
              - not_null
          - name: activity_count
            data_tests:
              - not_null

      - name: raw_bitre_vehicle_makes
        description: "National registered vehicle counts by make from BITRE"

      - name: raw_cpi
        description: "ABS All Groups CPI series republished by RBA table G1"

      - name: raw_rba_cash_rate
        description: "RBA cash-rate target series from table F1"

models:
  - name: stg_listings
    description: "Cleaned and standardised vehicle listings"
    columns:
      - name: listing_id
        description: "Surrogate key for each listing"
        data_tests:
          - unique
          - not_null
      - name: price_aud
        description: "Listed price in Australian dollars"
        data_tests:
          - not_null
      - name: brand
        description: "Standardised brand name (lowercase)"
        data_tests:
          - not_null
      - name: manufacture_year
        description: "Year of vehicle manufacture"
        data_tests:
          - not_null
      - name: vehicle_age
        description: "Calculated age of vehicle in years"
      - name: listing_snapshot_date
        description: "Source snapshot date used for temporal validation"
        data_tests:
          - not_null

  - name: stg_fuel_prices
    description: "Cleaned NSW fuel price data"
    columns:
      - name: station_code
        description: "Station identifier"
      - name: price_per_litre
        description: "Fuel price in dollars per litre"
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0.5
                max_value: 5.0

  - name: stg_qld_registrations
    description: "Cleaned QLD new-registration and transfer activity"
    columns:
      - name: make
        description: "Vehicle make (lowercase)"
        data_tests:
          - not_null
      - name: activity_count
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1

  - name: stg_bitre_vehicle_makes
    description: "Cleaned national registered-vehicle counts by make"
    columns:
      - name: make
        data_tests:
          - not_null
      - name: registered_vehicles
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0

  - name: stg_economic_context
    description: "Quarterly Australian CPI context"
    columns:
      - name: cpi_index
        data_tests:
          - not_null

  - name: stg_rba_cash_rate
    description: "RBA cash-rate target history"
    columns:
      - name: cash_rate_target_pct
        data_tests:
          - not_null
